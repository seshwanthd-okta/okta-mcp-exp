        <script type="text/javascript">

              // initialize global variables.

              var nodes;
              var allNodes;
              var allEdges;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"borderWidth": 3, "color": {"background": "#4A90D9", "border": "#FFD700"}, "font": {"color": "#ffffff"}, "id": "get_user", "label": "Step 1\nget_user", "shape": "dot", "size": 30, "title": "\u003cb\u003eget_user\u003c/b\u003e\u003cbr\u003e\u003ci\u003eLook up a user by ID, login, email, or display name\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eEntity: user\u003cbr\u003eOperation: read\u003cbr\u003eRequired: user_id\u003cbr\u003eOptional: none\u003cbr\u003eOutputs: id, profile, status\u003cbr\u003eTags: lookup, identity, resolve\u003cbr\u003eDestructive: No"}, {"borderWidth": 3, "color": {"background": "#7B68EE", "border": "#FFD700"}, "font": {"color": "#ffffff"}, "id": "list_user_groups", "label": "Step 2\nlist_user_groups", "shape": "dot", "size": 30, "title": "\u003cb\u003elist_user_groups\u003c/b\u003e\u003cbr\u003e\u003ci\u003eList all groups a user belongs to\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eEntity: group\u003cbr\u003eOperation: read\u003cbr\u003eRequired: user_id\u003cbr\u003eOptional: none\u003cbr\u003eOutputs: items\u003cbr\u003eTags: membership, enumerate\u003cbr\u003eDestructive: No"}, {"borderWidth": 3, "color": {"background": "#7B68EE", "border": "#FF0000"}, "font": {"color": "#ffffff"}, "id": "remove_user_from_group", "label": "Step 3\nremove_user_from_group", "shape": "diamond", "size": 30, "title": "\u003cb\u003eremove_user_from_group\u003c/b\u003e\u003cbr\u003e\u003ci\u003eRemove a user from a group\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eEntity: group\u003cbr\u003eOperation: write\u003cbr\u003eRequired: group_id, user_id\u003cbr\u003eOptional: none\u003cbr\u003eOutputs: status\u003cbr\u003eTags: membership, revoke, access\u003cbr\u003eDestructive: \u26a0\ufe0f YES"}, {"borderWidth": 3, "color": {"background": "#E67E22", "border": "#FFD700"}, "font": {"color": "#ffffff"}, "id": "list_user_app_assignments", "label": "Step 4\nlist_user_app_assignments", "shape": "dot", "size": 30, "title": "\u003cb\u003elist_user_app_assignments\u003c/b\u003e\u003cbr\u003e\u003ci\u003eList all application assignments for a user\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eEntity: application\u003cbr\u003eOperation: read\u003cbr\u003eRequired: user_id\u003cbr\u003eOptional: none\u003cbr\u003eOutputs: items\u003cbr\u003eTags: assignment, enumerate, access\u003cbr\u003eDestructive: No"}, {"borderWidth": 3, "color": {"background": "#4A90D9", "border": "#FF0000"}, "font": {"color": "#ffffff"}, "id": "deactivate_user", "label": "Step 5\ndeactivate_user", "shape": "diamond", "size": 30, "title": "\u003cb\u003edeactivate_user\u003c/b\u003e\u003cbr\u003e\u003ci\u003eDeactivate a user account\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eEntity: user\u003cbr\u003eOperation: write\u003cbr\u003eRequired: user_id\u003cbr\u003eOptional: none\u003cbr\u003eOutputs: status\u003cbr\u003eTags: lifecycle, disable, offboard\u003cbr\u003eDestructive: \u26a0\ufe0f YES"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#888888", "dashes": false, "font": {"align": "middle", "color": "#cccccc", "size": 9}, "from": "get_user", "label": "id \u2192 user_id", "title": "User ID from lookup feeds into list_user_groups", "to": "list_user_groups", "width": 1}, {"arrows": "to", "color": "#888888", "dashes": false, "font": {"align": "middle", "color": "#cccccc", "size": 9}, "from": "get_user", "label": "id \u2192 user_id", "title": "User ID from lookup feeds into deactivate_user", "to": "deactivate_user", "width": 1}, {"arrows": "to", "color": "#888888", "dashes": false, "font": {"align": "middle", "color": "#cccccc", "size": 9}, "from": "get_user", "label": "id \u2192 user_id", "title": "User ID from lookup feeds into list_user_app_assignments", "to": "list_user_app_assignments", "width": 1}, {"arrows": "to", "color": "#888888", "dashes": false, "font": {"align": "middle", "color": "#cccccc", "size": 9}, "from": "get_user", "label": "id \u2192 user_id", "title": "User ID from lookup feeds into remove_user_from_group", "to": "remove_user_from_group", "width": 1}, {"arrows": "to", "color": "#FFD700", "dashes": true, "font": {"align": "middle", "color": "#cccccc", "size": 9}, "from": "list_user_groups", "label": "items \u2192 group_id", "title": "Iterate over groups to remove user from each", "to": "remove_user_from_group", "width": 3}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -3000,
            "springConstant": 0.05,
            "springLength": 150
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
